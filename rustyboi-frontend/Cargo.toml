[package]
name = "rustyboi-frontend"
version = "0.1.0"
edition = "2024"

[lib]
# The `_lib` suffix keeps the lib name distinct from any bin target that links
# it (same rationale as the other rustyboi crates; only matters on Windows —
# see https://github.com/rust-lang/cargo/issues/8519).
name = "rustyboi_frontend_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# The portable app + UI + renderer. Owns the raw wgpu renderer (game texture +
# scale pipeline + egui-wgpu compositing), the egui UI (via rustyboi-egui), and
# the `App` that drives `Session`. No winit, no window, no cpal, no file I/O —
# the platform crate supplies the surface/device, pumps input, and owns audio.
[dependencies]
rustyboi-core = { path = "../rustyboi-core" }
rustyboi-session = { path = "../rustyboi-session" }
rustyboi-egui = { path = "../rustyboi-egui" }
egui = "0.26"
egui-wgpu = "0.26.0"
# Depend on wgpu directly (pixels is gone). This resolves to the same 0.19 that
# egui-wgpu 0.26 pulls, so the wgpu types the renderer and egui-wgpu exchange
# are one and the same. The `webgl` feature is added by the web adapter later
# (phase 2); phase-1 desktop uses the default native backends.
wgpu = "0.19"
# winit is needed only for the `Window`/`WindowEvent`/`EventLoopWindowTarget`
# types egui-winit bridges — the frontend never creates a window itself; the
# platform crate does, and forwards its winit events here. Features mirror the
# platform's per-target winit config so the two link the same winit build.
winit = { version = "0.29", default-features = false, features = ["rwh_06"] }

# egui-winit is the egui<->winit input bridge; its feature set is configured
# per-target so Android/web don't pull wayland/x11.
[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "android")))'.dependencies]
egui-winit = { version = "0.26", default-features = false, features = ["clipboard", "links", "wayland", "x11"] }
winit = { version = "0.29", default-features = false, features = ["rwh_06", "wayland", "wayland-csd-adwaita", "wayland-dlopen", "x11"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
egui-winit = { version = "0.26", default-features = false, features = ["links"] }

[target.'cfg(target_os = "android")'.dependencies]
egui-winit = { version = "0.26", default-features = false, features = ["links"] }
winit = { version = "0.29", default-features = false, features = ["android-game-activity", "rwh_06"] }
