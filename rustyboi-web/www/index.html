<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>rustyboi — web</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f380f" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="rustyboi" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #14161a; overflow: hidden; }
    /* The whole UI (menus, cheats, keybinds, settings, and the game) is egui,
       drawn by wgpu (WebGL2) into this one canvas. It fills the viewport; egui
       lays out the menu bar / status panel and letterboxes the game itself. */
    #screen {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;      /* egui handles all pointer/touch gestures */
      outline: none;
    }
    /* Boot / fatal-error message shown until the egui canvas takes over. */
    #boot {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      font: 14px system-ui, sans-serif; color: #9aa2ad; background: #14161a;
      text-align: center; padding: 1rem; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="screen" tabindex="0"></canvas>
  <div id="boot">Loading emulator…</div>

  <!--
    Main-thread shell. Emulation runs in worker.js; this file owns the canvas,
    the egui/wgpu driver (WebApp), and the AudioContext (WebAudio is main-thread
    only). The worker posts the framebuffer (transferred) + a UI-state snapshot
    each frame; the driver renders the egui UI over the game and posts back the
    UiActions egui produces + the GB button state.
  -->
  <script type="module">
    import init, { WebAudio, WebApp } from "./pkg/rustyboi_web.js";

    const bootEl = document.getElementById("boot");
    const setBoot = (msg) => { if (bootEl) bootEl.textContent = msg; };
    const hideBoot = () => { if (bootEl) bootEl.remove(); };

    // Size the canvas backing store to CSS-size × devicePixelRatio so egui is
    // crisp on hi-DPI / high-refresh displays. winit picks up the change and
    // emits a Resized event that reconfigures the wgpu surface.
    function sizeCanvas(canvas) {
      const dpr = window.devicePixelRatio || 1;
      let w = Math.max(1, Math.round(window.innerWidth * dpr));
      let h = Math.max(1, Math.round(window.innerHeight * dpr));
      // Cap the render (backing-store) resolution. wgpu-WebGL2 fragment cost
      // scales with pixel count, and a maximized hi-DPI window (millions of px)
      // tanked fps. The GB screen is 160x144 pixel-art that upscales fine, so a
      // ~1440px-long backing looks the same on screen while the browser CSS-
      // scales the canvas to fill the viewport. Bounds cost regardless of window.
      const CAP = 1440;
      const longer = Math.max(w, h);
      if (longer > CAP) { const s = CAP / longer; w = Math.round(w * s); h = Math.round(h * s); }
      if (canvas.width !== w) canvas.width = w;
      if (canvas.height !== h) canvas.height = h;
    }

    async function main() {
      // Main-thread wasm instance: WebAudio sink + the egui/wgpu WebApp driver.
      await init();
      const audio = new WebAudio();

      // Spawn the emulator worker (owns the Session; self-paced at ~59.73 fps).
      const worker = new Worker(new URL("./worker.js", import.meta.url), { type: "module" });
      const send = (msg, transfer) => worker.postMessage(msg, transfer || []);

      // Outbound bridges the egui driver calls to reach the worker:
      const postAction = (json) => send({ type: "Action", json });
      const postInput = (mask) => send({ type: "SetInput", mask });
      const loadRom = (name, bytes) => {
        // `bytes` is a Uint8Array; transfer its buffer (no copy).
        const buf = bytes.buffer;
        send({ type: "LoadRom", name, bytes: buf }, [buf]);
      };
      const loadState = (bytes) => {
        const buf = bytes.buffer;
        send({ type: "LoadState", bytes: buf }, [buf]);
      };
      // Hold-to-rewind: the driver calls this on Backspace down/up.
      const setRewind = (on) => send({ type: "SetRewind", on: !!on });
      // Import a picked file (state/battery/rtc). `bytes` is a Uint8Array; the
      // rfd picker already read it — transfer its buffer to the worker (no copy).
      const importFile = (purpose, name, bytes) => {
        const buf = bytes.buffer;
        send({ type: "ImportFile", purpose, name, bytes: buf }, [buf]);
      };
      // Ask the worker to produce export bytes; it replies with an Export message
      // (handled below) that triggers the browser download.
      const requestExport = (kind) => send({ type: "RequestExport", kind });
      // Tell the worker which debug snapshot to build (which panels are open).
      // The driver calls this only when the open-panel set changes.
      const postDebugDetail = (active, bits) =>
        send({ type: "SetDebugDetail", active: !!active, bits: bits & 0xff });
      // Toggle canvas fullscreen (main-thread DOM; the worker is not involved).
      const toggleFullscreen = () => {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          const el = document.getElementById("screen");
          if (el && el.requestFullscreen) el.requestFullscreen();
        }
      };

      // Trigger a browser download of `bytes` (Uint8Array) as `name`. Browsers
      // cannot write files directly, so we Blob → object URL → synthetic <a>
      // click → revoke. Runs on the main thread (DOM access required).
      const downloadBytes = (name, bytes) => {
        const blob = new Blob([bytes], { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name || "download.bin";
        document.body.appendChild(a);
        a.click();
        a.remove();
        // Revoke on the next tick so the click's navigation has resolved.
        setTimeout(() => URL.revokeObjectURL(url), 0);
      };

      const canvas = document.getElementById("screen");
      sizeCanvas(canvas);

      const app = new WebApp(postAction, postInput, loadRom, loadState, setRewind, importFile, requestExport, postDebugDetail, toggleFullscreen);

      // Route worker → main messages into the egui driver + audio sink.
      worker.onmessage = (e) => {
        const m = e.data;
        switch (m.type) {
          case "Ready":
            break;
          case "Frame":
            // m.rgba is a Uint8Array transferred from the worker. on_frame copies
            // its bytes into the wasm-side framebuffer, so the buffer is free the
            // moment it returns — transfer it back to the worker's pool (no
            // per-frame allocation, so the GC sawtooth flattens).
            app.on_frame(m.rgba, m.width, m.height);
            send({ type: "ReturnBuffer", buf: m.rgba.buffer }, [m.rgba.buffer]);
            break;
          case "UiState":
            app.on_ui_state(m.json);
            break;
          case "DebugSnapshot":
            // m.bytes is a Uint8Array (bincode) transferred from the worker; the
            // driver deserializes it into the read-model the debug panels render.
            app.on_debug_snapshot(m.bytes);
            break;
          case "Audio":
            audio.queue(m.samples); // Float32Array, transferred from the worker
            break;
          case "Export":
            // m.bytes is a Uint8Array transferred from the worker; download it.
            downloadBytes(m.name, m.bytes);
            break;
          case "Status":
            app.on_status(m.msg);
            break;
          case "Error":
            app.on_error(m.msg);
            break;
          case "ClearError":
            app.clear_error();
            break;
          case "ResizeContent":
            // The egui central region letterboxes any content size; nothing to
            // do here (kept so an SGB-border size change is a no-op, not a gap).
            break;
          default:
            break;
        }
      };

      // Boot the worker's emulator (no canvas transfer — main thread renders).
      send({ type: "Init" });

      // Start the egui/wgpu driver on the canvas. Awaits wgpu WebGL2 setup, then
      // the browser drives the render loop (requestAnimationFrame) from here on.
      try {
        await app.start(canvas);
      } catch (err) {
        setBoot(`Renderer failed: ${err}. This build needs WebGL2 (enable it in Firefox).`);
        return;
      }
      hideBoot();

      // Keep the canvas backing store matched to the viewport on resize.
      window.addEventListener("resize", () => sizeCanvas(canvas));

      // WebAudio must be resumed inside a user gesture. Resume on the first
      // interaction anywhere (click/key/touch), then stop listening.
      const resumeAudio = () => {
        audio.resume();
        window.removeEventListener("pointerdown", resumeAudio);
        window.removeEventListener("keydown", resumeAudio);
      };
      window.addEventListener("pointerdown", resumeAudio);
      window.addEventListener("keydown", resumeAudio);
    }

    main().catch((err) => setBoot(`Fatal: ${err}`));

    // PWA: register the offline service worker + a user-prompted update flow.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        let reloading = false;
        // The new worker took control (after the user accepted) — reload once.
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });

        let reg;
        try { reg = await navigator.serviceWorker.register("sw.js"); }
        catch { return; }

        const showUpdate = (worker) => {
          if (document.getElementById("update-bar")) return;
          const bar = document.createElement("div");
          bar.id = "update-bar";
          bar.textContent = "A new version is available. ";
          bar.style.cssText =
            "position:fixed;left:0;right:0;bottom:0;z-index:9999;padding:10px 14px;" +
            "background:#0f380f;color:#9bbc0f;font:14px system-ui,sans-serif;" +
            "display:flex;gap:12px;align-items:center;justify-content:center;";
          const reload = document.createElement("button");
          reload.textContent = "Reload";
          reload.style.cssText =
            "background:#9bbc0f;color:#0f380f;border:0;border-radius:6px;" +
            "padding:6px 14px;font-weight:600;cursor:pointer;";
          reload.onclick = () => worker.postMessage("SKIP_WAITING");
          const later = document.createElement("button");
          later.textContent = "Later";
          later.style.cssText = "background:transparent;color:#9bbc0f;border:0;cursor:pointer;";
          later.onclick = () => bar.remove();
          bar.append(reload, later);
          document.body.appendChild(bar);
        };

        // A worker may already be waiting from a previous visit.
        if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);

        // A new worker started installing this session — prompt once it's ready,
        // but only if there is an existing controller (i.e. it's an UPDATE, not
        // the first install).
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener("statechange", () => {
            if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdate(nw);
          });
        });
      });
    }
  </script>
</body>
</html>
