<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>rustyboi — web</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f380f" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="rustyboi" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #14161a;
      color: #e6e8eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0; letter-spacing: 0.02em; }
    /* GB screen is 160x144; scale up with nearest-neighbour so pixels stay crisp. */
    #screen {
      width: 480px;   /* 3x */
      height: 432px;  /* 3x */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      border: 1px solid #2a2e35;
      border-radius: 4px;
    }
    .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; justify-content: center; }
    button, label.file, select {
      background: #23272e;
      color: #e6e8eb;
      border: 1px solid #333941;
      border-radius: 4px;
      padding: 0.4rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    button:hover, label.file:hover { background: #2c313a; }
    input[type=file] { display: none; }
    #status { font-size: 0.8rem; color: #9aa2ad; min-height: 1.2em; }
    .keys { font-size: 0.75rem; color: #7d8590; max-width: 480px; text-align: center; line-height: 1.5; }
    .keys code { background: #23272e; padding: 0.05rem 0.35rem; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>rustyboi — Game Boy / Color (web)</h1>
  <canvas id="screen" width="160" height="144"></canvas>

  <div class="controls">
    <label class="file">
      Load ROM…
      <input id="rom" type="file" accept=".gb,.gbc,.bin,.rom,.zip" />
    </label>
    <select id="hardware" title="Hardware model (applies on next ROM load)">
      <option value="cgb">CGB</option>
      <option value="dmg">DMG</option>
    </select>
    <button id="pause">Pause</button>
    <button id="save">Save (slot 0)</button>
    <button id="load">Load (slot 0)</button>
  </div>

  <div id="status">Loading emulator…</div>

  <div class="keys">
    Controls: <code>←↑↓→</code> D-pad · <code>X</code> A · <code>Z</code> B ·
    <code>Enter</code> Start · <code>Shift</code> Select · <code>P</code> pause ·
    <code>Tab</code> (hold) fast-forward · <code>F5</code> quicksave ·
    <code>F8</code> quickload
  </div>

  <!--
    Thin main-thread shell. Emulation runs in worker.js; this file owns only the
    DOM UI, keyboard input, and the AudioContext (WebAudio is main-thread only).
    Video is drawn by the worker straight to the OffscreenCanvas we transfer to
    it, so no framebuffer is ever posted back.
  -->
  <script type="module">
    import init, { WebAudio } from "./pkg/rustyboi_web.js";

    const statusEl = document.getElementById("status");
    const setStatus = (msg) => { statusEl.textContent = msg; };

    async function main() {
      // Main-thread wasm instance: only used for the WebAudio sink.
      await init();
      const audio = new WebAudio();

      // OffscreenCanvas + module workers are the target path (current Firefox +
      // Chrome). Fail loudly if unavailable rather than silently degrading.
      const canvasEl = document.getElementById("screen");
      if (!canvasEl.transferControlToOffscreen) {
        setStatus("This browser lacks OffscreenCanvas — please update Firefox/Chrome.");
        return;
      }
      const offscreen = canvasEl.transferControlToOffscreen();

      const worker = new Worker(new URL("./worker.js", import.meta.url), { type: "module" });
      // Transfer the OffscreenCanvas to the worker; it renders directly into it.
      worker.postMessage({ type: "Init", canvas: offscreen }, [offscreen]);

      worker.onmessage = (e) => {
        const m = e.data;
        switch (m.type) {
          case "Ready":
            // Reflect persisted hardware choice in the selector.
            if (m.hardware) document.getElementById("hardware").value = m.hardware;
            break;
          case "Audio":
            audio.queue(m.samples); // Float32Array, transferred from the worker
            break;
          case "Status":
            setStatus(m.msg);
            break;
          case "Saved":
            setStatus(`Saved ${m.slot === "quick" ? "quicksave" : "slot " + m.slot}.`);
            break;
          case "Loaded":
            setStatus(`Loaded ${m.slot === "quick" ? "quicksave" : "slot " + m.slot}.`);
            break;
          case "Error":
            setStatus(`Error: ${m.msg}`);
            break;
          default:
            break;
        }
      };

      const send = (msg, transfer) => worker.postMessage(msg, transfer || []);

      // --- ROM loading (Firefox-safe: <input type=file>, no FS Access API) ---
      document.getElementById("rom").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // Resume audio here — this handler runs inside a user gesture.
        audio.resume();
        const buf = await file.arrayBuffer();
        // Transfer the ArrayBuffer to the worker (no copy).
        send({ type: "LoadRom", bytes: buf, name: file.name }, [buf]);
      });

      // --- Hardware model ---
      document.getElementById("hardware").addEventListener("change", (e) => {
        send({ type: "SetHardware", model: e.target.value });
      });

      // --- Save / load state (slot 0) ---
      document.getElementById("save").addEventListener("click", () => {
        send({ type: "SaveSlot", n: 0, timestamp: Date.now() });
      });
      document.getElementById("load").addEventListener("click", () => {
        send({ type: "LoadSlot", n: 0 });
      });

      // --- Pause ---
      document.getElementById("pause").addEventListener("click", () => send({ type: "TogglePause" }));

      // --- Keyboard input → worker (session applies remap) ---
      window.addEventListener("keydown", (e) => {
        if (e.repeat) {
          if (isGameKey(e.code)) e.preventDefault();
          return;
        }
        switch (e.code) {
          case "KeyP": send({ type: "TogglePause" }); return;
          case "Tab": e.preventDefault(); send({ type: "SetFastForward", on: true }); return;
          case "F5": e.preventDefault(); send({ type: "Quicksave", timestamp: Date.now() }); return;
          case "F8": e.preventDefault(); send({ type: "Quickload" }); return;
        }
        send({ type: "SetButton", code: e.code, pressed: true });
        if (isGameKey(e.code)) e.preventDefault();
      });
      window.addEventListener("keyup", (e) => {
        if (e.code === "Tab") { send({ type: "SetFastForward", on: false }); return; }
        send({ type: "SetButton", code: e.code, pressed: false });
      });
      // Drop all held keys if the page loses focus (avoids stuck buttons).
      window.addEventListener("blur", () => send({ type: "ClearInput" }));

      setStatus("Ready — load a ROM to start.");
    }

    function isGameKey(code) {
      return ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight",
              "KeyX","KeyZ","Enter","ShiftLeft","ShiftRight"].includes(code);
    }

    main().catch((err) => setStatus(`Fatal: ${err}`));

    // PWA: register the offline service worker + a user-prompted update flow.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        let reloading = false;
        // The new worker took control (after the user accepted) — reload once.
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });

        let reg;
        try { reg = await navigator.serviceWorker.register("sw.js"); }
        catch { return; }

        const showUpdate = (worker) => {
          if (document.getElementById("update-bar")) return;
          const bar = document.createElement("div");
          bar.id = "update-bar";
          bar.textContent = "A new version is available. ";
          bar.style.cssText =
            "position:fixed;left:0;right:0;bottom:0;z-index:9999;padding:10px 14px;" +
            "background:#0f380f;color:#9bbc0f;font:14px system-ui,sans-serif;" +
            "display:flex;gap:12px;align-items:center;justify-content:center;";
          const reload = document.createElement("button");
          reload.textContent = "Reload";
          reload.style.cssText =
            "background:#9bbc0f;color:#0f380f;border:0;border-radius:6px;" +
            "padding:6px 14px;font-weight:600;cursor:pointer;";
          reload.onclick = () => worker.postMessage("SKIP_WAITING");
          const later = document.createElement("button");
          later.textContent = "Later";
          later.style.cssText = "background:transparent;color:#9bbc0f;border:0;cursor:pointer;";
          later.onclick = () => bar.remove();
          bar.append(reload, later);
          document.body.appendChild(bar);
        };

        // A worker may already be waiting from a previous visit.
        if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);

        // A new worker started installing this session — prompt once it's ready,
        // but only if there is an existing controller (i.e. it's an UPDATE, not
        // the first install).
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener("statechange", () => {
            if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdate(nw);
          });
        });
      });
    }
  </script>
</body>
</html>
