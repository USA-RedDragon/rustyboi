<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>rustyboi — web</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f380f" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="rustyboi" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #14161a;
      color: #e6e8eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin: 0; letter-spacing: 0.02em; }
    /* GB screen is 160x144; scale up with nearest-neighbour so pixels stay crisp. */
    #screen {
      width: 480px;   /* 3x */
      height: 432px;  /* 3x */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      border: 1px solid #2a2e35;
      border-radius: 4px;
    }
    .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; justify-content: center; }
    button, label.file, select {
      background: #23272e;
      color: #e6e8eb;
      border: 1px solid #333941;
      border-radius: 4px;
      padding: 0.4rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    button:hover, label.file:hover { background: #2c313a; }
    input[type=file] { display: none; }
    #status { font-size: 0.8rem; color: #9aa2ad; min-height: 1.2em; }
    .keys { font-size: 0.75rem; color: #7d8590; max-width: 480px; text-align: center; line-height: 1.5; }
    .keys code { background: #23272e; padding: 0.05rem 0.35rem; border-radius: 3px; }

    /* --- On-screen joypad overlay ---
       Fixed layer over the whole viewport; individual buttons are absolutely
       positioned from the SHARED rustyboi-session TouchLayout geometry. Hidden
       by default; toggled via the ToggleTouchControls action / session state. */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      pointer-events: none;             /* layer is transparent to clicks... */
      touch-action: none;               /* we handle all touch gestures */
      -webkit-user-select: none;
      user-select: none;
    }
    #overlay.on { display: block; }
    #overlay .btn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e6e8eb;
      background: rgba(40, 44, 52, 0.55);
      border: 2px solid rgba(155, 188, 15, 0.6);
      font-weight: 700;
      pointer-events: auto;             /* ...only the buttons take input */
      touch-action: none;
      transition: background 0.05s;
    }
    #overlay .btn.circle { border-radius: 50%; }
    #overlay .btn.pill { border-radius: 999px; font-size: 0.7rem; letter-spacing: 0.04em; }
    #overlay .btn.pressed { background: rgba(155, 188, 15, 0.7); color: #0f380f; }
  </style>
</head>
<body>
  <h1>rustyboi — Game Boy / Color (web)</h1>
  <canvas id="screen" width="160" height="144"></canvas>

  <div class="controls">
    <label class="file">
      Load ROM…
      <input id="rom" type="file" accept=".gb,.gbc,.bin,.rom,.zip" />
    </label>
    <select id="hardware" title="Hardware model (applies on next ROM load)">
      <option value="cgb">CGB</option>
      <option value="dmg">DMG</option>
    </select>
    <button id="pause">Pause</button>
    <button id="save">Save (slot 0)</button>
    <button id="load">Load (slot 0)</button>
    <button id="touch">On-screen Controls</button>
  </div>

  <div id="status">Loading emulator…</div>

  <!-- On-screen joypad; buttons injected from the shared TouchLayout geometry. -->
  <div id="overlay" aria-hidden="true"></div>

  <div class="keys">
    Controls: <code>←↑↓→</code> D-pad · <code>X</code> A · <code>Z</code> B ·
    <code>Enter</code> Start · <code>Shift</code> Select · <code>P</code> pause ·
    <code>Tab</code> (hold) fast-forward · <code>F5</code> quicksave ·
    <code>F8</code> quickload · <em>On-screen Controls</em> toggles a touch joypad
  </div>

  <!--
    Thin main-thread shell. Emulation runs in worker.js; this file owns only the
    DOM UI, keyboard input, and the AudioContext (WebAudio is main-thread only).
    Video is drawn by the worker straight to the OffscreenCanvas we transfer to
    it, so no framebuffer is ever posted back.
  -->
  <script type="module">
    import init, { WebAudio, TouchOverlay } from "./pkg/rustyboi_web.js";

    const statusEl = document.getElementById("status");
    const setStatus = (msg) => { statusEl.textContent = msg; };

    async function main() {
      // Main-thread wasm instance: WebAudio sink + the shared touch-overlay
      // geometry (TouchOverlay wraps rustyboi_session::overlay::TouchLayout).
      await init();
      const audio = new WebAudio();

      // OffscreenCanvas + module workers are the target path (current Firefox +
      // Chrome). Fail loudly if unavailable rather than silently degrading.
      const canvasEl = document.getElementById("screen");
      if (!canvasEl.transferControlToOffscreen) {
        setStatus("This browser lacks OffscreenCanvas — please update Firefox/Chrome.");
        return;
      }
      const offscreen = canvasEl.transferControlToOffscreen();

      const worker = new Worker(new URL("./worker.js", import.meta.url), { type: "module" });
      // Transfer the OffscreenCanvas to the worker; it renders directly into it.
      worker.postMessage({ type: "Init", canvas: offscreen }, [offscreen]);

      worker.onmessage = (e) => {
        const m = e.data;
        switch (m.type) {
          case "Ready":
            // Reflect persisted hardware choice in the selector.
            if (m.hardware) document.getElementById("hardware").value = m.hardware;
            // Apply persisted UI state, then default the overlay on for touch.
            if (m.uiState) applyUiState(m.uiState);
            break;
          case "Audio":
            audio.queue(m.samples); // Float32Array, transferred from the worker
            break;
          case "Status":
            setStatus(m.msg);
            break;
          case "Error":
            setStatus(`Error: ${m.msg}`);
            break;
          case "ClearError":
            // A load succeeded / error dismissed — nothing to clear in this shell
            // beyond leaving the next Status to overwrite the line.
            break;
          case "ResizeContent":
            // Content stays 160x144 on web; keep the fixed 3x CSS box. Hook left
            // here so an SGB-border-sized content would resize the visible canvas.
            break;
          case "TouchControls":
            setOverlayVisible(!!m.on);
            break;
          default:
            break;
        }
      };

      const send = (msg, transfer) => worker.postMessage(msg, transfer || []);

      // --- On-screen joypad overlay (shared TouchLayout geometry) ------------
      const overlayEl = document.getElementById("overlay");
      let overlay = null;      // TouchOverlay (wasm) — geometry + hit-testing
      const btnEls = [];       // DOM nodes for each overlay button
      const pointers = new Map(); // pointerId -> {x, y} active touches
      let lastMask = -1;

      // (Re)build the DOM buttons for the current viewport size.
      function buildOverlay() {
        const w = window.innerWidth, h = window.innerHeight;
        if (!overlay) overlay = new TouchOverlay(w, h);
        else overlay.resize(w, h);
        overlayEl.replaceChildren();
        btnEls.length = 0;
        const unit = overlay.unit();
        for (const b of overlay.layout()) {
          const el = document.createElement("div");
          el.className = `btn ${b.shape}`;
          el.textContent = b.label;
          el.style.left = `${b.x}px`;
          el.style.top = `${b.y}px`;
          el.style.width = `${b.w}px`;
          el.style.height = `${b.h}px`;
          el.style.fontSize = b.shape === "pill" ? `${unit * 0.28}px` : `${unit * 0.5}px`;
          el.dataset.button = b.button;
          el.addEventListener("pointerdown", onDown);
          overlayEl.appendChild(el);
          btnEls.push(el);
        }
        recomputeMask();
      }

      // Recompute the pressed mask from all active pointers via the shared
      // multi-touch button_state, forward it to the worker, and reflect the
      // pressed visuals. Only sends when the mask actually changes.
      function recomputeMask() {
        if (!overlay) return;
        const xs = new Float32Array(pointers.size);
        const ys = new Float32Array(pointers.size);
        let i = 0;
        for (const p of pointers.values()) { xs[i] = p.x; ys[i] = p.y; i++; }
        const mask = overlay.button_mask(xs, ys);
        if (mask !== lastMask) {
          lastMask = mask;
          send({ type: "SetTouchMask", mask });
          for (const el of btnEls) {
            const bit = BUTTON_BIT[el.dataset.button];
            el.classList.toggle("pressed", (mask & (1 << bit)) !== 0);
          }
        }
      }

      const BUTTON_BIT = { a:0, b:1, start:2, select:3, up:4, down:5, left:6, right:7 };

      function overlayVisible() { return overlayEl.classList.contains("on"); }
      function setOverlayVisible(on) {
        overlayEl.classList.toggle("on", on);
        overlayEl.setAttribute("aria-hidden", on ? "false" : "true");
        if (on) buildOverlay();
        else { pointers.clear(); lastMask = -1; send({ type: "SetTouchMask", mask: 0 }); }
      }

      // Pointer events (touch + mouse + pen). A press starts on a button; we
      // capture the pointer to that button so a finger can slide across the pad
      // and still hit-test against the full shared layout via button_mask.
      const point = (e) => ({ x: e.clientX, y: e.clientY });
      function onDown(e) {
        e.preventDefault();
        e.currentTarget.setPointerCapture?.(e.pointerId);
        e.currentTarget.addEventListener("pointermove", onMove);
        e.currentTarget.addEventListener("pointerup", onUp);
        e.currentTarget.addEventListener("pointercancel", onUp);
        e.currentTarget.addEventListener("lostpointercapture", onUp);
        pointers.set(e.pointerId, point(e));
        recomputeMask();
      }
      function onMove(e) {
        if (!pointers.has(e.pointerId)) return;
        e.preventDefault();
        pointers.set(e.pointerId, point(e));
        recomputeMask();
      }
      function onUp(e) {
        const t = e.currentTarget;
        t.removeEventListener("pointermove", onMove);
        t.removeEventListener("pointerup", onUp);
        t.removeEventListener("pointercancel", onUp);
        t.removeEventListener("lostpointercapture", onUp);
        if (pointers.delete(e.pointerId)) recomputeMask();
      }

      // Rebuild geometry on resize / orientation change while shown.
      window.addEventListener("resize", () => { if (overlayVisible()) buildOverlay(); });

      // The View toggle: drive it through the session's ToggleTouchControls
      // action; the worker replies TouchControls{on} which shows/hides the layer.
      document.getElementById("touch").addEventListener("click", () => {
        send({ type: "ToggleTouchControls" });
      });

      // Reflect persisted UI state; auto-show the overlay on touch-first devices.
      function applyUiState(s) {
        if (s.hardware) document.getElementById("hardware").value = s.hardware;
        const coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
        let want = !!s.touchControls;
        // If the session default doesn't have it on but this is a touch device,
        // turn it on once so a phone user gets controls without hunting a menu.
        if (!want && coarse) { send({ type: "ToggleTouchControls" }); return; }
        setOverlayVisible(want);
      }

      // --- ROM loading (Firefox-safe: <input type=file>, no FS Access API) ---
      document.getElementById("rom").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // Resume audio here — this handler runs inside a user gesture.
        audio.resume();
        const buf = await file.arrayBuffer();
        // Transfer the ArrayBuffer to the worker (no copy).
        send({ type: "LoadRom", bytes: buf, name: file.name }, [buf]);
      });

      // --- Hardware model ---
      document.getElementById("hardware").addEventListener("change", (e) => {
        send({ type: "SetHardware", model: e.target.value });
      });

      // --- Save / load state (slot 0) ---
      document.getElementById("save").addEventListener("click", () => {
        send({ type: "SaveSlot", n: 0, timestamp: Date.now() });
      });
      document.getElementById("load").addEventListener("click", () => {
        send({ type: "LoadSlot", n: 0 });
      });

      // --- Pause ---
      document.getElementById("pause").addEventListener("click", () => send({ type: "TogglePause" }));

      // --- Keyboard input → worker (session applies remap) ---
      window.addEventListener("keydown", (e) => {
        if (e.repeat) {
          // Swallow repeats for every key we handle — including Tab/F5/F8, else
          // held-Tab fast-forward lets the browser's default Tab focus-walk fire.
          if (isGameKey(e.code) || ["Tab", "F5", "F8", "KeyP"].includes(e.code)) e.preventDefault();
          return;
        }
        switch (e.code) {
          case "KeyP": send({ type: "TogglePause" }); return;
          case "Tab": e.preventDefault(); send({ type: "SetFastForward", on: true }); return;
          case "F5": e.preventDefault(); send({ type: "Quicksave", timestamp: Date.now() }); return;
          case "F8": e.preventDefault(); send({ type: "Quickload" }); return;
        }
        send({ type: "SetButton", code: e.code, pressed: true });
        if (isGameKey(e.code)) e.preventDefault();
      });
      window.addEventListener("keyup", (e) => {
        if (e.code === "Tab") { send({ type: "SetFastForward", on: false }); return; }
        send({ type: "SetButton", code: e.code, pressed: false });
      });
      // Drop all held keys if the page loses focus (avoids stuck buttons).
      window.addEventListener("blur", () => send({ type: "ClearInput" }));

      setStatus("Ready — load a ROM to start.");
    }

    function isGameKey(code) {
      return ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight",
              "KeyX","KeyZ","Enter","ShiftLeft","ShiftRight"].includes(code);
    }

    main().catch((err) => setStatus(`Fatal: ${err}`));

    // PWA: register the offline service worker + a user-prompted update flow.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        let reloading = false;
        // The new worker took control (after the user accepted) — reload once.
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });

        let reg;
        try { reg = await navigator.serviceWorker.register("sw.js"); }
        catch { return; }

        const showUpdate = (worker) => {
          if (document.getElementById("update-bar")) return;
          const bar = document.createElement("div");
          bar.id = "update-bar";
          bar.textContent = "A new version is available. ";
          bar.style.cssText =
            "position:fixed;left:0;right:0;bottom:0;z-index:9999;padding:10px 14px;" +
            "background:#0f380f;color:#9bbc0f;font:14px system-ui,sans-serif;" +
            "display:flex;gap:12px;align-items:center;justify-content:center;";
          const reload = document.createElement("button");
          reload.textContent = "Reload";
          reload.style.cssText =
            "background:#9bbc0f;color:#0f380f;border:0;border-radius:6px;" +
            "padding:6px 14px;font-weight:600;cursor:pointer;";
          reload.onclick = () => worker.postMessage("SKIP_WAITING");
          const later = document.createElement("button");
          later.textContent = "Later";
          later.style.cssText = "background:transparent;color:#9bbc0f;border:0;cursor:pointer;";
          later.onclick = () => bar.remove();
          bar.append(reload, later);
          document.body.appendChild(bar);
        };

        // A worker may already be waiting from a previous visit.
        if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);

        // A new worker started installing this session — prompt once it's ready,
        // but only if there is an existing controller (i.e. it's an UPDATE, not
        // the first install).
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener("statechange", () => {
            if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdate(nw);
          });
        });
      });
    }
  </script>
</body>
</html>
