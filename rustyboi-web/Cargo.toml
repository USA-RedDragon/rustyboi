[package]
name = "rustyboi-web"
version = "0.1.0"
edition = "2021"
description = "WASM/Firefox web frontend for the rustyboi Game Boy / Color emulator"

[lib]
crate-type = ["cdylib"]

# wasm-pack's BUNDLED wasm-opt is too old to validate the post-MVP wasm features
# LLVM emits (bulk-memory memory.copy/fill, sign-ext, ...). So disable it here
# and run a current binaryen wasm-opt from `tools/build-web.sh` instead, which
# passes `-all` (enable all features — required even on the latest binaryen).
# Build with `tools/build-web.sh`, NOT bare `wasm-pack build`. Needs binaryen
# (`sudo pacman -S binaryen`).
[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[package.metadata.wasm-pack.profile.profiling]
wasm-opt = false

[dependencies]
rustyboi-session = { path = "../rustyboi-session" }
rustyboi-core = { path = "../rustyboi-core" }

wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"

[dependencies.web-sys]
version = "0.3"
features = [
    # Rendering (worker-side, OffscreenCanvas transferred from the main thread)
    "OffscreenCanvas",
    "OffscreenCanvasRenderingContext2d",
    "ImageData",
    "console",
    # IndexedDB storage
    "IdbFactory",
    "IdbDatabase",
    "IdbObjectStore",
    "IdbTransaction",
    "IdbTransactionMode",
    "IdbRequest",
    "IdbOpenDbRequest",
    "IdbKeyRange",
    "IdbCursorWithValue",
    "IdbCursor",
    "DomStringList",
    "Event",
    # WebAudio
    "AudioContext",
    "AudioContextState",
    "AudioBuffer",
    "AudioBufferSourceNode",
    "AudioDestinationNode",
    "AudioNode",
    "AudioParam",
    "GainNode",
]
