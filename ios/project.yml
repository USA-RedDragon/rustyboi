# XcodeGen spec for the rustyboi iOS app — kept for local Xcode development
# (`xcodegen generate` opens the app in Xcode). The `make ios` build does NOT use
# Xcode: it cross-compiles + links in the rust-cross container (see ios/Makefile)
# and reads only the bundle metadata below (MARKETING_VERSION,
# CURRENT_PROJECT_VERSION, PRODUCT_BUNDLE_IDENTIFIER). The app is a thin UIKit
# shell (Sources/main.m) that links the Rust staticlib
# (librustyboi_platform_lib.a, built by cargo for aarch64-apple-ios) and calls
# `rustyboi_ios_main`; winit's UIKit backend drives everything from there.
name: rustyboi
options:
  bundleIdPrefix: dev.mcswain
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "NO"
targets:
  rustyboi:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mcswain.rustyboi
        INFOPLIST_FILE: Info.plist
        ENABLE_BITCODE: "NO"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(RUST_LIB_DIR)"
        OTHER_LDFLAGS: "$(inherited) $(RUST_LIB_DIR)/librustyboi_platform_lib.a -liconv -lobjc"
    dependencies:
      - sdk: UIKit.framework
      - sdk: QuartzCore.framework
      - sdk: Metal.framework
      # softbuffer's iOS presenter (software renderer backend) uses CoreGraphics.
      - sdk: CoreGraphics.framework
      - sdk: Foundation.framework
      - sdk: CoreFoundation.framework
      - sdk: AVFAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      # Provides the UTTypeData constant used by the document picker (iOS 14+).
      - sdk: UniformTypeIdentifiers.framework
schemes:
  rustyboi:
    build:
      targets:
        rustyboi: all
    run:
      config: Release
    archive:
      config: Release
