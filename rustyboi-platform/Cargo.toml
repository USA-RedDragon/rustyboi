[package]
name = "rustyboi-platform"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "rustyboi"
path = "src/main.rs"

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "rustyboi_platform_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
rustyboi-core = { path = "../rustyboi-core" }
rustyboi-egui = { path = "../rustyboi-egui" }
rustyboi-session = { path = "../rustyboi-session" }
egui = "0.26"
egui-wgpu = "0.26.0"
clap = { version = "4.5.48", features = ["derive"] }
log = "0.4.28"
pixels = "0.15.0"
rodio = "0.19"
serde_json = "1.0.145"
# winit features are configured per-target below so Android doesn't pull wayland/x11.
winit = { version = "0.29", default-features = false, features = ["rwh_06"] }
winit_input_helper = "0.16.0"

[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "android")))'.dependencies]
winit = { version = "0.29", default-features = false, features = ["rwh_06", "wayland", "wayland-csd-adwaita", "wayland-dlopen", "x11"] }
egui-winit = { version = "0.26", default-features = false, features = ["clipboard", "links", "wayland", "x11"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1.7"
console_log = "1.0.0"
egui-winit = { version = "0.26", default-features = false, features = ["links"] }
web-sys = { version = "0.3.81", features = ["GpuTextureFormat"] }
wasm-bindgen = "0.2.104"
wasm-bindgen-futures = "0.4.54"

[target.'cfg(target_os = "android")'.dependencies]
# Use GameActivity through winit's android-activity backend (subclassable from
# Kotlin/Java, forwards onActivityResult, better IME/lifecycle than NativeActivity).
winit = { version = "0.29", default-features = false, features = ["android-game-activity", "rwh_06"] }
# Re-declare egui-winit without wayland/x11 features (Android has neither).
egui-winit = { version = "0.26", default-features = false, features = ["links"] }
android_logger = "0.13"
jni = "0.21"
libc = "0.2"
ndk-context = "0.1"
# Force rodio's transitive cpal to enable the oboe backend on Android.
# Version is pinned to whatever rodio currently pulls in (see Cargo.lock);
# bump alongside rodio upgrades.
cpal = { version = "0.15", features = ["oboe-shared-stdcxx"] }
