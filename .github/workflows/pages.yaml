name: Deploy GitHub Pages

on:
  push:
    branches: [claude]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build wasm bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ROMS_URL: ${{ secrets.ROMS_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/free-disk-space

      - name: Cache build dir
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: web-

      - name: Generate PGO profile
        if: ${{ env.ROMS_URL != '' }}
        shell: bash
        run: |
          curl -fsSL "$ROMS_URL" -o /tmp/roms.zip
          unzip -q /tmp/roms.zip -d "$RUNNER_TEMP/romlib"
          LIB="$(dirname "$(find "$RUNNER_TEMP/romlib" -maxdepth 3 -type d -name GB | head -1)")"
          [ -d "$LIB/GB" ] && [ -d "$LIB/GBC" ] || { echo "GB/ + GBC/ not in zip" >&2; exit 1; }
          make pgo-gen CONTAINER=1 ROMS="$LIB/GB $LIB/GBC"

      - name: Build web bundle
        shell: bash
        run: . tools/rust-cross.sh && rc_run '(command -v wasm-pack >/dev/null || cargo install wasm-pack) && make web'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: rustyboi-web/www

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
