name: Deploy GitHub Pages

on:
  push:
    branches: [claude]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: '1.94.1'
  WASM_PACK_VERSION: v0.13.1
  BINARYEN_VERSION: version_119

jobs:
  build:
    name: Build wasm bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }} + wasm target)
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal \
            --target wasm32-unknown-unknown
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: web-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: web-${{ env.RUST_TOOLCHAIN }}-

      - name: Install wasm-pack ${{ env.WASM_PACK_VERSION }}
        run: |
          url="https://github.com/rustwasm/wasm-pack/releases/download/${WASM_PACK_VERSION}/wasm-pack-${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$url" | tar -xz -C /tmp
          sudo install "/tmp/wasm-pack-${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack" /usr/local/bin/
          wasm-pack --version

      - name: Install binaryen ${{ env.BINARYEN_VERSION }} (wasm-opt)
        run: |
          url="https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          curl -fsSL "$url" | tar -xz -C /tmp
          echo "/tmp/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build web bundle
        run: |
          wasm-opt --version
          tools/build-web.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: rustyboi-web/www

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
