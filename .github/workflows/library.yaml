name: Library Sweep

# Behavioral + boot regression gate across the entire commercial game library
# (~1200 ROMs = ~1200 canaries, far wider than the test suites), plus an HTML
# screenshot gallery artifact. Requires the ROMS_URL secret: a zip of the
# library preserving the GB/ and GBC/ directory layout (./GB/<rom>.zip,
# ./GBC/<rom>.zip). Skips cleanly when the secret is absent (forks).
#
# The committed baseline (tools/library-baseline.jsonl) is regenerated with:
#   cargo build --release -p rustyboi-test-runner --bin sweep
#   ./target/release/sweep run --roms <lib>/GB <lib>/GBC --out sweep-out
#   cp sweep-out/manifest.jsonl tools/library-baseline.jsonl
# Hashes are machine-independent (deterministic core + seeded input masher);
# only the fps fields differ across machines, and this job ignores perf
# (--ignore-perf) because shared runners are too noisy to gate on. Perf gating
# happens locally via `sweep compare` without that flag.

on:
  push:
    branches: [claude]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      ROMS_URL: ${{ secrets.ROMS_URL }}
      ROMS_PASSWORD: ${{ secrets.ROMS_PASSWORD }}
      # Media fan-out knob. The regression GATE (manifest -> compare) is
      # UNAFFECTED by this — it is always one canonical row per ROM, produced by
      # a media-free code path. This only controls the gallery media.
      #
      # The dominant cost is the hardware MATRIX: each extra model is a full
      # extra emulation pass per ROM (measured ~2.4s/ROM @ 3000 frames). Adding
      # HEVC+AAC video on top of a pass is only ~+0.65s/ROM (+27%). Sizes @ 1148
      # ROMs: posters ~450 MB per hardware model; videos ~0.7 GB per model.
      #
      # Default = CGB + DMG posters (the two most informative tabs — DMG renders
      # the "cannot run on this system" panel for CGB-only carts — at ~3x the old
      # single-hardware sweep: 1 canonical manifest pass + 2 media passes). To
      # ship the full DMG/CGB/SGB/AGB matrix WITH videos, set
      # SWEEP_MEDIA_ARGS='--hardware dmg,cgb,sgb,agb' (drop --no-videos); confirm
      # the job stays under timeout-minutes and the artifact under your limit
      # first (full treatment ~= 5x runtime, ~4.5 GB artifact). To run only the
      # gate with no gallery, use '--no-screens'.
      SWEEP_MEDIA_ARGS: "--hardware cgb,dmg --no-videos"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check for ROMS_URL secret
        id: gate
        shell: bash
        run: |
          if [ -n "$ROMS_URL" ]; then
            echo "have=1" >> "$GITHUB_OUTPUT"
          else
            echo "ROMS_URL secret not set; skipping library sweep"
          fi
      - name: Install ffmpeg
        if: steps.gate.outputs.have == '1'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Roomy docker disk
        if: steps.gate.outputs.have == '1'
        uses: ./.github/actions/free-disk-space
      - name: Cache build dir
        if: steps.gate.outputs.have == '1'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: sweep-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sweep-
      - name: Download ROM library
        if: steps.gate.outputs.have == '1'
        shell: bash
        run: |
          curl -fsSL "$ROMS_URL" -o /tmp/roms.zip
          unzip -P "$ROMS_PASSWORD" -q /tmp/roms.zip -d "$RUNNER_TEMP/romlib"
          # Tolerate an extra top-level directory inside the zip: find the
          # parent that actually holds GB/ and GBC/.
          LIB="$(dirname "$(find "$RUNNER_TEMP/romlib" -maxdepth 3 -type d -name GB | head -1)")"
          [ -d "$LIB/GB" ] && [ -d "$LIB/GBC" ] || { echo "GB/ + GBC/ not found in zip" >&2; exit 1; }
          echo "LIB=$LIB" >> "$GITHUB_ENV"
          echo "$(ls "$LIB/GB" | wc -l) GB + $(ls "$LIB/GBC" | wc -l) GBC ROMs"
      - name: Generate PGO profile
        if: steps.gate.outputs.have == '1'
        shell: bash
        run: make pgo-gen CONTAINER=1 ROMS="$LIB/GB $LIB/GBC"
      - name: Build sweep
        if: steps.gate.outputs.have == '1'
        shell: bash
        run: . tools/rust-cross.sh && rc_run 'RUSTFLAGS="$(make -s pgo-flags 2>/dev/null || true) ${RUSTFLAGS:-}" cargo build --release -p rustyboi-test-runner --bin sweep'
      - name: Run library sweep
        if: steps.gate.outputs.have == '1'
        shell: bash
        run: ./target/release/sweep run --roms "$LIB/GB" "$LIB/GBC" --out sweep-out $SWEEP_MEDIA_ARGS
      - name: Compare against baseline
        if: steps.gate.outputs.have == '1'
        shell: bash
        run: |
          ./target/release/sweep compare \
            --base tools/library-baseline.jsonl \
            --cand sweep-out/manifest.jsonl \
            --ignore-perf --out sweep-out/report.md
      - name: Build gallery
        if: ${{ always() && steps.gate.outputs.have == '1' }}
        shell: bash
        run: |
          ./target/release/sweep gallery \
            --manifest sweep-out/manifest.jsonl \
            --screens sweep-out/screens \
            --out sweep-out/gallery.html
      - name: Upload artifacts
        if: ${{ always() && steps.gate.outputs.have == '1' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: library-sweep
          path: |
            sweep-out/gallery.html
            sweep-out/screens
            sweep-out/videos
            sweep-out/report.md
            sweep-out/manifest.jsonl
          retention-days: 30
