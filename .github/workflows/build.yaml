name: Build
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: 'build / ${{ matrix.target }}'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/usa-reddragon/rust-cross:1.94.1@sha256:824108f3a93447345db239f23ae306d2d14ccf82430ad8de7f680ea3a4f9ce6e
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            linker: aarch64-linux-musl-gcc
          - target: armv7-unknown-linux-musleabihf
            linker: arm-linux-musleabihf-gcc
          - target: x86_64-unknown-linux-musl
            linker: x86_64-linux-musl-gcc
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-${{ matrix.target }}-
      - name: Build test runner for ${{ matrix.target }}
        env:
          RUSTUP_TOOLCHAIN: '1.94.1'
        run: |
          triple_env="$(echo '${{ matrix.target }}' | tr 'a-z-' 'A-Z_')"
          export "CARGO_TARGET_${triple_env}_LINKER=${{ matrix.linker }}"
          # Scope to the test runner: a bare `cargo build` compiles the workspace
          # default-members, which include rustyboi-platform (rodio -> cpal ->
          # alsa-sys) -- a desktop GUI/audio crate that has no musl cross target.
          cargo build --release -p rustyboi-test-runner --target ${{ matrix.target }}
