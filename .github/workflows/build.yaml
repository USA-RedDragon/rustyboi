name: Build
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: 'build / ${{ matrix.target }}'
    runs-on: ubuntu-24.04
    env:
      ROMS_URL: ${{ secrets.ROMS_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # container = the build runs in the rust-cross image (its own rustc),
          # so its PGO profile must be generated in-container to match.
          - target: android
            makeargs: RELEASE=1 BUNDLE=1
            container: false
          - target: libretro
            mkflags: -j2 -k --output-sync=target
            makeargs: TARGETS=all
            container: true
          - target: native
            mkflags: -j2 -k --output-sync=target
            makeargs: TARGETS=all
            container: true
          - target: web
            makeargs: MODE=release
            container: false
          - target: ios
            makeargs: ""
            container: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-${{ matrix.target }}-
      - name: Generate PGO profile
        if: ${{ env.ROMS_URL != '' }}
        shell: bash
        run: |
          # Representative gameplay profile so the shipped artifacts are PGO'd.
          # ROMS_URL is a zip preserving ./GB ./GBC (same as the library sweep).
          curl -fsSL "$ROMS_URL" -o /tmp/roms.zip
          unzip -q /tmp/roms.zip -d "$RUNNER_TEMP/romlib"
          LIB="$(dirname "$(find "$RUNNER_TEMP/romlib" -maxdepth 3 -type d -name GB | head -1)")"
          [ -d "$LIB/GB" ] && [ -d "$LIB/GBC" ] || { echo "GB/ + GBC/ not in zip" >&2; exit 1; }
          if [ "${{ matrix.container }}" = "true" ]; then
            make pgo-gen CONTAINER=1 ROMS="$LIB/GB $LIB/GBC"
          else
            rustup component add llvm-tools
            make pgo-gen ROMS="$LIB/GB $LIB/GBC"
          fi
      - name: Build ${{ matrix.target }}
        run: |
          cargo install cargo-ndk
          cargo install wasm-pack
          rustup target add x86_64-linux-android aarch64-linux-android i686-linux-android armv7-linux-androideabi
          make ${{ matrix.mkflags }} ${{ matrix.target }} ${{ matrix.makeargs }}
