name: Build
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  setup:
    name: enumerate targets
    runs-on: ubuntu-24.04
    outputs:
      libretro: ${{ steps.gen.outputs.libretro }}
      native: ${{ steps.gen.outputs.native }}
      has_roms: ${{ steps.gen.outputs.has_roms }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: gen
        shell: bash
        env:
          ROMS_URL: ${{ secrets.ROMS_URL }}
        run: |
          {
            echo "libretro=$(. tools/rust-cross.sh && rc_names        | jq -Rsc 'split("\n")|map(select(length>0))')"
            echo "native=$(.   tools/rust-cross.sh && rc_names_native | jq -Rsc 'split("\n")|map(select(length>0))')"
            echo "has_roms=$([ -n "$ROMS_URL" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  pgo:
    name: pgo
    needs: setup
    if: ${{ needs.setup.outputs.has_roms == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: Fetch ROM library
        id: roms
        shell: bash
        env:
          ROMS_URL: ${{ secrets.ROMS_URL }}
        run: |
          # ROMS_URL is a zip preserving ./GB ./GBC (same as the library sweep).
          curl -fsSL "$ROMS_URL" -o /tmp/roms.zip
          unzip -q /tmp/roms.zip -d "$RUNNER_TEMP/romlib"
          LIB="$(dirname "$(find "$RUNNER_TEMP/romlib" -maxdepth 3 -type d -name GB | head -1)")"
          [ -d "$LIB/GB" ] && [ -d "$LIB/GBC" ] || { echo "GB/ + GBC/ not in zip" >&2; exit 1; }
          echo "lib=$LIB" >> "$GITHUB_OUTPUT"
      - name: Generate profile
        shell: bash
        run: make pgo-gen CONTAINER=1 ROMS="${{ steps.roms.outputs.lib }}/GB ${{ steps.roms.outputs.lib }}/GBC"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pgo
          path: target/pgo/
          retention-days: 1
          if-no-files-found: error

  libretro:
    name: 'libretro / ${{ matrix.name }}'
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.setup.outputs.libretro) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true   # no profile (ROMS_URL unset / gen failed) => plain build
      - name: Build libretro ${{ matrix.name }}
        run: make libretro TARGETS=${{ matrix.name }}

  native:
    name: 'native / ${{ matrix.name }}'
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.setup.outputs.native) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build native ${{ matrix.name }}
        run: make native TARGETS=${{ matrix.name }}

  android:
    name: 'android / ${{ matrix.abi }}'
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build android ${{ matrix.abi }}
        shell: bash
        run: . tools/rust-cross.sh && rc_run '(command -v cargo-ndk >/dev/null || cargo install cargo-ndk) && make android RELEASE=1 ABI=${{ matrix.abi }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-jnilib-${{ matrix.abi }}
          path: android/app/src/main/jniLibs
          if-no-files-found: error
          retention-days: 1

  android-bundle:
    name: android / aab
    needs: [setup, pgo, android]
    if: ${{ always() && needs.setup.result == 'success' && needs.android.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Download per-ABI native libs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: android-jnilib-*
          merge-multiple: true
          path: android/app/src/main/jniLibs
      - name: Bundle .aab (all ABIs, no recompile)
        shell: bash
        run: . tools/rust-cross.sh && rc_run 'make android BUNDLE=1 SKIP_RUST=1'
      - name: Verify .aab carries every ABI
        shell: bash
        run: |
          aab=android/app/build/outputs/bundle/release/app-release.aab
          got=$(unzip -l "$aab" | grep -oE 'base/lib/[^/]+' | sed 's#base/lib/##' | sort -u | paste -sd' ')
          echo "ABIs in aab: $got"
          for a in arm64-v8a armeabi-v7a x86_64 x86; do
            grep -qw "$a" <<<"$got" || { echo "::error::$a missing from .aab"; exit 1; }
          done

  web:
    name: web
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build web
        shell: bash
        run: . tools/rust-cross.sh && rc_run '(command -v wasm-pack >/dev/null || cargo install wasm-pack) && make web'
      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: rustyboi-web/www

  deploy-pages:
    name: Deploy to Pages
    needs: web
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  ios:
    name: ios
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build ios
        run: make ios
