name: Build
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  setup:
    name: enumerate targets
    runs-on: ubuntu-24.04
    outputs:
      libretro: ${{ steps.gen.outputs.libretro }}
      native: ${{ steps.gen.outputs.native }}
      has_roms: ${{ steps.gen.outputs.has_roms }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: gen
        shell: bash
        env:
          ROMS_URL: ${{ secrets.ROMS_URL }}
        run: |
          {
            echo "libretro=$(. tools/rust-cross.sh && rc_names_libretro | jq -Rsc 'split("\n")|map(select(length>0))')"
            echo "native=$(.   tools/rust-cross.sh && rc_names_native   | jq -Rsc 'split("\n")|map(select(length>0))')"
            echo "has_roms=$([ -n "$ROMS_URL" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  pgo:
    name: pgo
    needs: setup
    if: ${{ needs.setup.outputs.has_roms == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Restore or generate PGO profile
        uses: ./.github/actions/pgo
        with:
          roms-url: ${{ secrets.ROMS_URL }}
          roms-password: ${{ secrets.ROMS_PASSWORD }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pgo
          path: target/pgo/
          retention-days: 1
          if-no-files-found: error

  libretro:
    name: 'libretro / ${{ matrix.name }}'
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.setup.outputs.libretro) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true   # no profile (ROMS_URL unset / gen failed) => plain build
      - name: Build libretro ${{ matrix.name }}
        run: make libretro TARGETS=${{ matrix.name }}
      - name: Publish libretro ${{ matrix.name }}
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: libretro-${{ matrix.name }}
          path: target/libretro/${{ matrix.name }}/
          retention-days: 7
          if-no-files-found: error

  native:
    name: 'native / ${{ matrix.name }}'
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.setup.outputs.native) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build native ${{ matrix.name }}
        run: make native TARGETS=${{ matrix.name }}
      - name: Publish native ${{ matrix.name }}
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.name }}
          path: target/native/${{ matrix.name }}/
          retention-days: 7
          if-no-files-found: error

  android:
    name: 'android / ${{ matrix.abi }}'
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build android ${{ matrix.abi }}
        shell: bash
        run: . tools/rust-cross.sh && rc_run 'make android RELEASE=1 ABI=${{ matrix.abi }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-jnilib-${{ matrix.abi }}
          path: android/app/src/main/jniLibs
          if-no-files-found: error
          retention-days: 1
      - name: Publish apk ${{ matrix.abi }}
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk-${{ matrix.abi }}
          path: android/app/build/outputs/apk/release/app-${{ matrix.abi }}-release*.apk
          retention-days: 7
          if-no-files-found: error

  android-bundle:
    name: android / aab
    needs: [setup, pgo, android]
    if: ${{ always() && needs.setup.result == 'success' && needs.android.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Download per-ABI native libs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: android-jnilib-*
          merge-multiple: true
          path: android/app/src/main/jniLibs
      - name: Bundle .aab (all ABIs, no recompile)
        shell: bash
        run: . tools/rust-cross.sh && rc_run 'make android BUNDLE=1 SKIP_RUST=1'
      - name: Verify .aab carries every ABI
        shell: bash
        run: |
          aab=android/app/build/outputs/bundle/release/app-release.aab
          got=$(unzip -l "$aab" | grep -oE 'base/lib/[^/]+' | sed 's#base/lib/##' | sort -u | paste -sd' ')
          echo "ABIs in aab: $got"
          for a in arm64-v8a armeabi-v7a x86_64 x86; do
            grep -qw "$a" <<<"$got" || { echo "::error::$a missing from .aab"; exit 1; }
          done
      - name: Publish .aab
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
          if-no-files-found: error

  web:
    name: web
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build web
        shell: bash
        run: . tools/rust-cross.sh && rc_run 'make web'
      - name: Publish built site
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-www
          path: rustyboi-web/www
          if-no-files-found: error
          retention-days: 30
      - name: Trigger Pages deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yaml -R "${{ github.repository }}" --ref "$GITHUB_REF_NAME"

  ios:
    name: ios
    needs: [setup, pgo]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pgo
          path: target/pgo
        continue-on-error: true
      - name: Build ios
        run: make ios
      - name: Publish ios
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/claude' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios
          path: ios/build/
          retention-days: 7
          if-no-files-found: error

  build-success:
    name: Build success check
    if: always()
    runs-on: ubuntu-24.04
    needs: [libretro, native, android-bundle, web, ios]
    steps:
      - shell: bash
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r '
            to_entries[]
            | select(.value.result != "success")
            | "\(.key)=\(.value.result)"')
          if [ -n "$bad" ]; then
            echo "::error::One or more jobs failed: "; echo "$bad"
            exit 1
          fi
