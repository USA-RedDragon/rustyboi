name: Build
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: 'build / ${{ matrix.target }}'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            args: --release --bundle
          - target: libretro
            args: --all
          - target: native
            args: --all
          - target: web
            args: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-${{ matrix.target }}-
      - name: Build ${{ matrix.target }}
        run: |
          cargo install cargo-ndk
          cargo install wasm-pack
          rustup target add x86_64-linux-android aarch64-linux-android i686-linux-android armv7-linux-androideabi
          ./tools/build-${{ matrix.target }}.sh ${{ matrix.args }}

  ios-app:
    name: 'build / ios-app'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust (+ iOS simulator target)
        shell: bash
        run: |
          rustup default stable
          rustup target add aarch64-apple-ios-sim
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-ios-app-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-ios-app-
      - name: Build iOS app (Simulator, unsigned)
        run: ./tools/build-ios.sh --simulator
