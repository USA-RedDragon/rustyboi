name: Test Suites
on:
  push:
    branches: [claude]

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  suites-linux:
    name: 'suite / ${{ matrix.suite }} / ubuntu-24.04 x64'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        suite:
          - acid2
          - cgb_acid_hell
          - mealybug
          - mooneye
          - mooneye_wilbertpol
          - age
          - gbmicrotest
          - samesuite_apu
          - samesuite_nonapu
          - samesuite_sgb
          - sgb
          - blargg
          - blargg_singles
          - scribbltests
          - turtle_tests
          - little_things_gb
          - bully
          - strikethrough
          - rtc3test
          - mbc3_tester
          - gambatte
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ubuntu-24.04-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-ubuntu-24.04-
      - name: Cache ROM set
        uses: actions/cache@v4
        with:
          path: gb-test-roms
          key: roms-v7.0-gambatte-5a41a68c
      - name: Fetch ROMs
        run: ./tools/run-suites.sh setup
      - name: Build test runner
        run: ./tools/run-suites.sh build
      - name: Run ${{ matrix.suite }}
        run: RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 ./tools/run-suites.sh ${{ matrix.suite }}

  suites-cross-os:
    name: 'suite / ${{ matrix.suite }} / ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
        suite:
          - acid2
          - mealybug
          - mooneye
          - blargg
          - gambatte
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup default stable
      - name: Cache cargo + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-
      - name: Cache ROM set
        uses: actions/cache@v4
        with:
          path: gb-test-roms
          key: roms-v7.0-gambatte-5a41a68c-${{ matrix.os }}
      - name: Fetch ROMs
        shell: bash
        run: ./tools/run-suites.sh setup
      - name: Build test runner
        shell: bash
        run: ./tools/run-suites.sh build
      - name: Run ${{ matrix.suite }}
        shell: bash
        run: RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 ./tools/run-suites.sh ${{ matrix.suite }}
