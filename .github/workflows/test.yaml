name: Test Suites
on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read   # pgo-restore polls the caches + runs API

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # Assemble the first-party test ROMs once and share them with every suite cell
  # as an artifact. rgbds isn't apt-installable, ships no arm64-linux binary, and
  # its Makefile needs make -- so building per-cell across win/mac/arm is fragile;
  # the ROMs are platform-independent, so build once on linux-x86_64 (the one
  # place the toolchain is trivial) and fan them out.
  build-roms:
    name: 'build first-party ROMs'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install RGBDS
        shell: bash
        run: |
          curl -fsSL -o rgbds.tar.xz https://github.com/gbdev/rgbds/releases/download/v1.0.1/rgbds-linux-x86_64.tar.xz
          mkdir -p "$HOME/rgbds" && tar xf rgbds.tar.xz -C "$HOME/rgbds"
          echo "$HOME/rgbds" >> "$GITHUB_PATH"
      - name: Assemble ROMs
        shell: bash
        run: make roms
      - name: Upload ROMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: first-party-roms
          path: test-roms/build
          retention-days: 1

  # PGO profiles come from the standalone PGO workflow (pgo.yaml); pgo-restore
  # waits while it generates and degrades loudly if it failed.
  build-runner:
    name: 'runner / ${{ matrix.name }}'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        name:
          - linux-x86_64
          - linux-aarch64
          - linux-armv7
          - windows-x86_64
          - windows-arm64
          - macos-x86_64
          - macos-aarch64
          - wasm32-wasip1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: PGO profile
        uses: ./.github/actions/pgo-restore
      - name: Build runner ${{ matrix.name }}
        run: make runner TARGETS=${{ matrix.name }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runner-${{ matrix.name }}
          path: target/runner/${{ matrix.name }}/
          if-no-files-found: error
          retention-days: 1

  test:
    name: '${{ matrix.suite }} / ${{ matrix.os }} / ${{ matrix.arch }}'
    runs-on: ${{ matrix.runs-on }}
    needs: [build-roms, build-runner]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, macos, wasm]
        arch: [x86_64, aarch64, armv7]
        suite:
          - rustyboi
          - acid2
          - cgb_acid_hell
          - mealybug
          - mooneye
          - mooneye_wilbertpol
          - age
          - gbmicrotest
          - samesuite_apu
          - samesuite_nonapu
          - samesuite_sgb
          - sgb
          - blargg
          - blargg_singles
          - scribbltests
          - turtle_tests
          - little_things_gb
          - bully
          - strikethrough
          - rtc3test
          - mbc3_tester
          - magentests
          - little_things_extra
          - sketchtests
          - gbc_hw_tests
          - gambatte
        exclude:
          - { os: windows, arch: armv7 }
          - { os: macos, arch: armv7 }
          - { os: wasm, arch: aarch64 }
          - { os: wasm, arch: armv7 }
        include:
          - { os: linux, arch: x86_64, runs-on: ubuntu-24.04, name: linux-x86_64 }
          - { os: linux, arch: aarch64, runs-on: ubuntu-24.04-arm, name: linux-aarch64 }
          - { os: linux, arch: armv7, runs-on: ubuntu-24.04, name: linux-armv7, qemu: true }
          - { os: windows, arch: x86_64, runs-on: windows-latest, name: windows-x86_64, exe: .exe }
          - { os: windows, arch: aarch64, runs-on: windows-11-arm, name: windows-arm64, exe: .exe }
          - { os: macos, arch: x86_64, runs-on: macos-latest, name: macos-x86_64, rosetta: true }
          - { os: macos, arch: aarch64, runs-on: macos-latest, name: macos-aarch64 }
          - { os: wasm, arch: x86_64, runs-on: ubuntu-24.04, name: wasm32-wasip1, wasm: true }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download first-party ROMs
        if: matrix.suite == 'rustyboi'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: first-party-roms
          path: test-roms/build
      - name: Set up qemu-user
        if: matrix.qemu
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-armhf-cross libgcc-s1-armhf-cross
          docker run --privileged --rm tonistiigi/binfmt --install arm
          echo "QEMU_LD_PREFIX=/usr/arm-linux-gnueabihf" >> "$GITHUB_ENV"
      - name: Install Rosetta
        if: matrix.rosetta
        shell: bash
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: Install wasmtime
        if: matrix.wasm
        shell: bash
        run: |
          # renovate: datasource=github-releases depName=bytecodealliance/wasmtime
          WASMTIME_VERSION=v46.0.1
          curl -fsSL -o wasmtime.tar.xz \
            "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz"
          mkdir -p "$HOME/wasmtime" && tar xf wasmtime.tar.xz -C "$HOME/wasmtime" --strip-components=1
          echo "$HOME/wasmtime" >> "$GITHUB_PATH"
      - name: Download runner
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: runner-${{ matrix.name }}
          path: runner
      - name: Cache ROM set
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: gb-test-roms
          key: roms-${{ matrix.os }}-v7.0-gambatte5a41a68c-shootout7c6ee9ba-daidcpp-magen050-ltgce015ca2-sketch02a-gbchw631e600
      - name: Fetch ROMs
        shell: bash
        run: make setup
      - name: Prepare runner binary
        if: ${{ !matrix.wasm }}
        shell: bash
        run: |
          bin="runner/rustyboi-test-runner${{ matrix.exe }}"
          chmod +x "$bin" || true
          # osxcross Mach-O needs an ad-hoc signature to run (hard requirement on
          # Apple Silicon; harmless elsewhere).
          if [ "${{ matrix.os }}" = macos ]; then codesign --force --sign - "$bin"; fi
      - name: Run ${{ matrix.suite }}
        shell: bash
        run: |
          if [ "${{ matrix.wasm }}" = true ]; then
            RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 RB_JOBS=1 \
              RB_BIN=runner/rustyboi-test-runner.wasm \
              RB_RUN_PREFIX="wasmtime run --dir=. --dir=/tmp --" \
              make suite SUITE=${{ matrix.suite }}
          else
            RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 \
              make suite SUITE=${{ matrix.suite }} RB_BIN=runner/rustyboi-test-runner${{ matrix.exe }}
          fi

  frontend-render:
    name: 'frontend / render / ${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04 }
          - { os: macos-latest }
          - { os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install software Vulkan (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: frontend-render-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: frontend-render-${{ matrix.os }}-
      - name: Run renderer + pacing tests
        shell: bash
        run: cargo test -p rustyboi-frontend -p rustyboi-session

  test-success:
    name: Test success check
    if: always()
    runs-on: ubuntu-24.04
    needs: [test, frontend-render]
    steps:
      - name: Check all matrix jobs succeeded
        shell: bash
        run: |
          if [ "${{ needs.test.result }}" != success ]; then
            echo "::error::One or more test jobs failed: ${{ needs.test.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend-render.result }}" != success ]; then
            echo "::error::Renderer tests failed: ${{ needs.frontend-render.result }}"
            exit 1
          fi

  progress:
    name: 'suite progress -> README'
    runs-on: ubuntu-24.04
    needs: [build-roms, build-runner]
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
      - name: Download first-party ROMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: first-party-roms
          path: test-roms/build
      - name: Download runner (linux-x86_64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: runner-linux-x86_64
          path: runner
      - name: Fetch ROMs
        shell: bash
        run: make setup
      - name: Generate progress table
        shell: bash
        run: |
          chmod +x runner/rustyboi-test-runner || true
          RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 RB_BIN=runner/rustyboi-test-runner make report-update
      - name: Commit + push if changed
        shell: bash
        run: |
          git config user.name 'usa-reddragon-auto-commit[bot]'
          git config user.email '198527162+github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff --cached --quiet; then
            echo 'suite progress table unchanged'
          else
            git commit -m 'docs: update test suite progress [skip ci]'
            git push
          fi

  web:
    name: 'web / ${{ matrix.browser }} / ${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, safari]
        os: [ubuntu-24.04, macos-latest]
        exclude:
          - { browser: safari, os: ubuntu-24.04 }
          - { browser: chrome, os: macos-latest }
          - { browser: firefox, os: macos-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: web-headless-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: web-headless-
      - name: Install wasm-pack + wasm target
        run: |
          cargo install wasm-pack
          rustup target add wasm32-unknown-unknown
      - name: Run web tests
        run: |
          case "${{ matrix.browser }}" in
            chrome)
              export CHROMEDRIVER="$CHROMEWEBDRIVER/chromedriver"
              wasm-pack test --headless --chrome rustyboi-web
              ;;
            firefox)
              export GECKODRIVER="$GECKOWEBDRIVER/geckodriver"
              wasm-pack test --headless --firefox rustyboi-web
              ;;
            safari)
              sudo safaridriver --enable
              wasm-pack test --headless --safari rustyboi-web
              ;;
          esac

  # No PGO: `make coverage` builds its own instrumented tree and never reads
  # target/pgo (coverage instrumentation and -Cprofile-use don't mix here).
  coverage:
    name: 'host / coverage'
    runs-on: ubuntu-24.04
    needs: build-roms
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install ALSA + udev headers (rustyboi-platform → cpal/rodio)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - name: Download first-party ROMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: first-party-roms
          path: test-roms/build
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: coverage-
      - name: Cache ROM set
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: gb-test-roms
          key: roms-linux-v7.0-gambatte5a41a68c-shootout7c6ee9ba-daidcpp-magen050-ltgce015ca2-sketch02a-gbchw631e600
      - name: Install Rust + llvm-tools
        run: |
          rustup default stable
          rustup component add llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Fetch ROMs
        run: make setup
      - name: Generate combined coverage (unit tests + ROM suites)
        run: make coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  android-coverage:
    name: 'android / coverage'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Run RomScan unit tests + JaCoCo
        working-directory: android
        # The ROM-scan helpers live in the pure-JVM :romscan module (only
        # java.util.zip + Kotlin stdlib), so coverage needs ONLY a JDK — no
        # Android SDK/NDK/platforms;android-37. configure-on-demand keeps the
        # android :app project (which would need the SDK) out of the graph.
        run: >-
          ./gradlew --no-daemon
          :romscan:test :romscan:jacocoTestReport
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: android/romscan/build/reports/jacoco/test/jacocoTestReport.xml
          flags: android
          token: ${{ secrets.CODECOV_TOKEN }}

  # rustyboi-web is wasm-only, so the host `coverage` job above can't build it.
  # Instrument the wasm build, run the headless-browser tests under minicov, and
  # export lcov (see `make coverage-web`). Reuses the same headless Chrome + driver
  # the `web` job relies on. Uploaded under the Codecov `web` flag.
  web-coverage:
    name: 'web / coverage'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/free-disk-space
      - name: Install clang (minicov compiles its wasm profiling runtime via cc)
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/wasm-cov
          key: web-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: web-coverage-
      - name: Install nightly + llvm-tools + wasm target
        run: |
          rustup toolchain install nightly --component llvm-tools --target wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Generate web coverage
        run: |
          # GitHub's ubuntu image ships Chrome + chromedriver; point the runner at it.
          export CHROMEDRIVER="$CHROMEWEBDRIVER/chromedriver"
          make coverage-web
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: rustyboi-web.lcov
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}
