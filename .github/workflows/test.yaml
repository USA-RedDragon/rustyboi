name: Test Suites
on:
  push:
    branches: [claude]
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # Assemble the first-party test ROMs once and share them with every suite cell
  # as an artifact. rgbds isn't apt-installable, ships no arm64-linux binary, and
  # its Makefile needs make -- so building per-cell across win/mac/arm is fragile;
  # the ROMs are platform-independent, so build once on linux-x86_64 (the one
  # place the toolchain is trivial) and fan them out.
  build-roms:
    name: 'build first-party ROMs'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install RGBDS
        shell: bash
        run: |
          curl -fsSL -o rgbds.tar.xz https://github.com/gbdev/rgbds/releases/download/v1.0.1/rgbds-linux-x86_64.tar.xz
          mkdir -p "$HOME/rgbds" && tar xf rgbds.tar.xz -C "$HOME/rgbds"
          echo "$HOME/rgbds" >> "$GITHUB_PATH"
      - name: Assemble ROMs
        shell: bash
        run: make -C test-roms roms
      - name: Upload ROMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: first-party-roms
          path: test-roms/build
          retention-days: 1

  test:
    name: '${{ matrix.suite }} / ${{ matrix.os }} / ${{ matrix.arch }}'
    runs-on: ${{ matrix.runs-on }}
    needs: build-roms
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, macos]
        arch: [x86_64, aarch64, armv7]
        suite:
          - rustyboi
          - acid2
          - cgb_acid_hell
          - mealybug
          - mooneye
          - mooneye_wilbertpol
          - age
          - gbmicrotest
          - samesuite_apu
          - samesuite_nonapu
          - samesuite_sgb
          - sgb
          - blargg
          - blargg_singles
          - scribbltests
          - turtle_tests
          - little_things_gb
          - bully
          - strikethrough
          - rtc3test
          - mbc3_tester
          - magentests
          - little_things_extra
          - sketchtests
          - gbc_hw_tests
          - gambatte
        exclude:
          - { os: windows, arch: armv7 }
          - { os: macos, arch: armv7 }
        include:
          - { os: linux, arch: x86_64, runs-on: ubuntu-24.04, target: x86_64-unknown-linux-gnu }
          - { os: linux, arch: aarch64, runs-on: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: linux, arch: armv7, runs-on: ubuntu-24.04, target: armv7-unknown-linux-gnueabihf, qemu: true }
          - { os: windows, arch: x86_64, runs-on: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows, arch: aarch64, runs-on: windows-11-arm, target: aarch64-pc-windows-msvc }
          - { os: macos, arch: x86_64, runs-on: macos-latest, target: x86_64-apple-darwin, rosetta: true }
          - { os: macos, arch: aarch64, runs-on: macos-latest, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        shell: bash
        run: |
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Download first-party ROMs
        if: matrix.suite == 'rustyboi'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: first-party-roms
          path: test-roms/build
      - name: Set up qemu-user + arm cross toolchain
        if: matrix.qemu
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
          # Register the qemu-user binfmt handlers so the cross-built armv7 binary
          # executes transparently on this x86_64 runner.
          docker run --privileged --rm tonistiigi/binfmt --install all
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> "$GITHUB_ENV"
          echo "QEMU_LD_PREFIX=/usr/arm-linux-gnueabihf" >> "$GITHUB_ENV"
      - name: Install Rosetta (x86_64 binary on Apple Silicon runner)
        if: matrix.rosetta
        shell: bash
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: Cache cargo + target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-
      - name: Cache ROM set
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: gb-test-roms
          key: roms-${{ matrix.os }}-v7.0-gambatte5a41a68c-shootout7c6ee9ba-daidcpp-magen050-ltgce015ca2-sketch02a-gbchw631e600
      - name: Fetch ROMs
        shell: bash
        run: ./tools/run-suites.sh setup
      - name: Build test runner
        shell: bash
        env:
          RB_TARGET: ${{ matrix.target }}
        run: ./tools/run-suites.sh build
      - name: Run ${{ matrix.suite }}
        shell: bash
        env:
          RB_TARGET: ${{ matrix.target }}
        run: RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 ./tools/run-suites.sh ${{ matrix.suite }}

  progress:
    name: 'suite progress -> README'
    runs-on: ubuntu-24.04
    needs: build-roms
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
      - name: Install Rust
        shell: bash
        run: rustup default stable
      - name: Download first-party ROMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: first-party-roms
          path: test-roms/build
      - name: Fetch ROMs
        shell: bash
        run: ./tools/run-suites.sh setup
      - name: Build test runner
        shell: bash
        run: ./tools/run-suites.sh build
      - name: Generate progress table
        shell: bash
        run: RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 ./tools/run-suites.sh report-update
      - name: Commit + push if changed
        shell: bash
        run: |
          git config user.name 'usa-reddragon-auto-commit[bot]'
          git config user.email '198527162+github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff --cached --quiet; then
            echo 'suite progress table unchanged'
          else
            git commit -m 'docs: update test suite progress [skip ci]'
            git push
          fi

  web:
    name: 'web / ${{ matrix.browser }} / ${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, safari]
        os: [ubuntu-24.04, macos-latest]
        exclude:
          - { browser: safari, os: ubuntu-24.04 }
          - { browser: chrome, os: macos-latest }
          - { browser: firefox, os: macos-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: web-headless-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: web-headless-
      - name: Install wasm-pack + wasm target
        run: |
          cargo install wasm-pack
          rustup target add wasm32-unknown-unknown
      - name: Run web tests
        run: |
          case "${{ matrix.browser }}" in
            chrome)
              export CHROMEDRIVER="$CHROMEWEBDRIVER/chromedriver"
              wasm-pack test --headless --chrome rustyboi-web
              ;;
            firefox)
              export GECKODRIVER="$GECKOWEBDRIVER/geckodriver"
              wasm-pack test --headless --firefox rustyboi-web
              ;;
            safari)
              sudo safaridriver --enable
              wasm-pack test --headless --safari rustyboi-web
              ;;
          esac

  coverage:
    name: 'host / coverage'
    runs-on: ubuntu-24.04
    needs: build-roms
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install ALSA + udev headers (rustyboi-platform → cpal/rodio)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev
      - name: Download first-party ROMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: first-party-roms
          path: test-roms/build
      - name: Cache cargo + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: coverage-
      - name: Cache ROM set
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: gb-test-roms
          key: roms-linux-v7.0-gambatte5a41a68c-shootout7c6ee9ba-daidcpp-magen050-ltgce015ca2-sketch02a-gbchw631e600
      - name: Install Rust + llvm-tools
        run: |
          rustup default stable
          rustup component add llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Fetch ROMs
        run: ./tools/run-suites.sh setup
      - name: Generate combined coverage (unit tests + ROM suites)
        run: |
          export CARGO_TARGET_DIR=target/llvm-cov-target
          source <(cargo llvm-cov show-env --export-prefix)
          rm -f "$CARGO_TARGET_DIR"/*.profraw "$CARGO_TARGET_DIR"/*.profdata
          cargo test \
            -p rustyboi-core -p rustyboi-session -p rustyboi-frontend \
            -p rustyboi-egui -p rustyboi-debugger -p rustyboi-test-runner \
            -p rustyboi-libretro-sys -p rustyboi-libretro -p rustyboi-platform
          cargo build --release -p rustyboi-test-runner
          # rustc hardcodes ATOMIC coverage counters (no opt-out); on the
          # emulator's hot loop that measures 15-21x wall. Patching lock->nop on
          # counter increments restores plain (racy-but-fine) counters: ~2.4x.
          python3 tools/deatomize-coverage.py "$CARGO_TARGET_DIR/release/rustyboi-test-runner"
          # Full board, EVERY suite. RB_SHARDS runs each suite as 4 separate
          # single-threaded processes: instrumented threads false-share the
          # in-process counter array (measured unrunnable); processes have
          # private counters and merge via %p profraws. Report-only (|| true):
          # the test matrix owns the regression gate.
          RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 RB_SHARDS=4 \
            RB_BIN="$CARGO_TARGET_DIR/release/rustyboi-test-runner" \
            ./tools/run-suites.sh all || true
          # cargo-llvm-cov's `report` can't map the raw-cargo-built runner (suite
          # coverage silently reads 0%); coverage-lcov.sh drives llvm-cov itself.
          ./tools/coverage-lcov.sh lcov.info \
            -p rustyboi-core -p rustyboi-session -p rustyboi-frontend \
            -p rustyboi-egui -p rustyboi-debugger -p rustyboi-test-runner \
            -p rustyboi-libretro-sys -p rustyboi-libretro -p rustyboi-platform
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
