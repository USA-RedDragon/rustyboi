name: Test Suites
on:
  push:
    branches: [claude]
  pull_request:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # One job, one matrix: os x arch x suite. Every cell RUNS its suite -- natively
  # where a hosted runner exists, and under qemu-user (binfmt) for the armv7 leg,
  # which has no native runner (hence its windows/macos exclusions: qemu-user is
  # Linux-only). `include` maps each (os, arch) to a runner + Rust target triple.
  # Builds go through tools/run-suites.sh, which scopes to -p rustyboi-test-runner
  # (a bare `cargo build` would pull the workspace default-member rustyboi-platform
  # -> rodio -> cpal -> alsa-sys and fail to cross-compile).
  test:
    name: '${{ matrix.suite }} / ${{ matrix.os }} / ${{ matrix.arch }}'
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, macos]
        arch: [x86_64, aarch64, armv7]
        suite:
          - acid2
          - cgb_acid_hell
          - mealybug
          - mooneye
          - mooneye_wilbertpol
          - age
          - gbmicrotest
          - samesuite_apu
          - samesuite_nonapu
          - samesuite_sgb
          - sgb
          - blargg
          - blargg_singles
          - scribbltests
          - turtle_tests
          - little_things_gb
          - bully
          - strikethrough
          - rtc3test
          - mbc3_tester
          - magentests
          - little_things_extra
          - sketchtests
          - gbc_hw_tests
          - gambatte
        exclude:
          - { os: windows, arch: armv7 }
          - { os: macos, arch: armv7 }
        include:
          - { os: linux, arch: x86_64, runs-on: ubuntu-24.04, target: x86_64-unknown-linux-gnu }
          - { os: linux, arch: aarch64, runs-on: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: linux, arch: armv7, runs-on: ubuntu-24.04, target: armv7-unknown-linux-gnueabihf, qemu: true }
          - { os: windows, arch: x86_64, runs-on: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows, arch: aarch64, runs-on: windows-11-arm, target: aarch64-pc-windows-msvc }
          - { os: macos, arch: x86_64, runs-on: macos-latest, target: x86_64-apple-darwin, rosetta: true }
          - { os: macos, arch: aarch64, runs-on: macos-latest, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Rust
        shell: bash
        run: |
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Set up qemu-user + arm cross toolchain
        if: matrix.qemu
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
          # Register the qemu-user binfmt handlers so the cross-built armv7 binary
          # executes transparently on this x86_64 runner.
          docker run --privileged --rm tonistiigi/binfmt --install all
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> "$GITHUB_ENV"
          echo "QEMU_LD_PREFIX=/usr/arm-linux-gnueabihf" >> "$GITHUB_ENV"
      - name: Install Rosetta (x86_64 binary on Apple Silicon runner)
        if: matrix.rosetta
        shell: bash
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-
      - name: Cache ROM set
        uses: actions/cache@v4
        with:
          path: gb-test-roms
          key: roms-${{ matrix.os }}-v7.0-gambatte5a41a68c-shootout7c6ee9ba-daidcpp-magen050-ltgce015ca2-sketch02a-gbchw631e600
      - name: Fetch ROMs
        shell: bash
        run: ./tools/run-suites.sh setup
      - name: Build test runner
        shell: bash
        env:
          RB_TARGET: ${{ matrix.target }}
        run: ./tools/run-suites.sh build
      - name: Run ${{ matrix.suite }}
        shell: bash
        env:
          RB_TARGET: ${{ matrix.target }}
        run: RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 ./tools/run-suites.sh ${{ matrix.suite }}

  progress:
    name: 'suite progress -> README'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
      - name: Install Rust
        shell: bash
        run: rustup default stable
      - name: Fetch ROMs
        shell: bash
        run: ./tools/run-suites.sh setup
      - name: Build test runner
        shell: bash
        run: ./tools/run-suites.sh build
      - name: Generate progress table
        shell: bash
        run: RB_SKIP_SETUP=1 RB_SKIP_BUILD=1 ./tools/run-suites.sh report-update
      - name: Commit + push if changed
        shell: bash
        run: |
          git config user.name 'usa-reddragon-auto-commit[bot]'
          git config user.email '198527162+github-actions[bot]@users.noreply.github.com'
          git add README.md
          if git diff --cached --quiet; then
            echo 'suite progress table unchanged'
          else
            git commit -m 'docs: update test suite progress [skip ci]'
            git push
          fi
