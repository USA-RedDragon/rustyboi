name: PGO profile
description: >-
  Ensure target/pgo holds the shared PGO profile: restore it from the actions
  cache (keyed on Cargo.lock + the rust-cross toolchain), and generate + save it
  when absent — so no caller ever builds un-PGO'd. `make pgo-flags`
  self-validates rustc compatibility on the consuming side. Concurrency note:
  workflows racing a fresh key each generate and the first cache save wins —
  bounded to key-bump pushes and deliberately NOT serialized via a repo-wide
  concurrency group, because pending-job replacement there cancels dependent
  chains.
inputs:
  roms-url:
    description: ROMS_URL secret (zip preserving GB/ + GBC/)
    required: true
  roms-password:
    description: ROMS_PASSWORD secret
    required: true
  free-disk:
    description: Run the free-disk-space action before generating (skip when the caller already did)
    required: false
    default: 'true'
outputs:
  cache-hit:
    description: Whether the profile came from cache ('true') or was generated
    value: ${{ steps.cache.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Restore PGO profile
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: target/pgo
        key: pgo-${{ hashFiles('**/Cargo.lock', 'tools/rust-cross.sh') }}
    - name: Roomy docker disk
      if: ${{ steps.cache.outputs.cache-hit != 'true' && inputs.free-disk == 'true' }}
      uses: ./.github/actions/free-disk-space
    - name: Fetch ROM library
      id: roms
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      env:
        ROMS_URL: ${{ inputs.roms-url }}
        ROMS_PASSWORD: ${{ inputs.roms-password }}
      run: |
        curl -fsSL "$ROMS_URL" -o /tmp/roms.zip
        unzip -P "$ROMS_PASSWORD" -q /tmp/roms.zip -d "$RUNNER_TEMP/romlib"
        LIB="$(dirname "$(find "$RUNNER_TEMP/romlib" -maxdepth 3 -type d -name GB | head -1)")"
        [ -d "$LIB/GB" ] && [ -d "$LIB/GBC" ] || { echo "GB/ + GBC/ not in zip" >&2; exit 1; }
        echo "lib=$LIB" >> "$GITHUB_OUTPUT"
    - name: Generate profile
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: make pgo-gen CONTAINER=1 ROMS="${{ steps.roms.outputs.lib }}/GB ${{ steps.roms.outputs.lib }}/GBC"
