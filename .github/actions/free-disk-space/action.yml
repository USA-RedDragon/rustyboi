name: Free up runner disk
description: >
  Container builds (the rust-cross image + cargo registry volume + target tree)
  can exhaust the runner's disk — unpacking the windows_*_gnu import libs alone
  is a few GB. GitHub's ubuntu runners are a SINGLE filesystem (/mnt is the same
  device as /, so there's no bigger mount to relocate Docker to); the only lever
  is to delete space. The rust-cross image ships every toolchain we need, so the
  runner's pre-installed SDKs are dead weight — remove the big ones. Done in
  parallel so wall time is roughly the slowest single rm, not the sum.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        echo "before: $(df -h --output=avail / | tail -1 | tr -d ' ') free on /"
        # Unused by a docker/make build; the container has its own toolchains.
        sudo rm -rf /usr/local/lib/android      & # ~11 GB  Android SDK/NDK
        sudo rm -rf /usr/share/dotnet           & # ~3 GB   .NET
        sudo rm -rf /opt/ghc /usr/local/.ghcup  & # ~5 GB   Haskell
        sudo rm -rf /usr/share/swift            & # ~2 GB   Swift
        sudo rm -rf /usr/local/share/powershell & # ~1 GB   PowerShell
        sudo rm -rf /opt/hostedtoolcache/CodeQL & # ~5 GB   CodeQL bundles
        wait
        echo "after:  $(df -h --output=avail / | tail -1 | tr -d ' ') free on /"
