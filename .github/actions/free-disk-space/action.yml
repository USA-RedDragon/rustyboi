name: Roomy docker disk
description: >
  Point Docker's data-root at /mnt (the runner's large ephemeral disk, ~65 GB
  free) so the big rust-cross image + cargo volume don't exhaust the ~20 GB on /.
  Everything here builds in that image, so this is what "No space left on device"
  needs — and it's a ~10 s daemon restart, not the minutes that deleting the
  preinstalled tool cache took.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo systemctl stop docker.service docker.socket
        sudo mkdir -p /mnt/docker
        echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json >/dev/null
        sudo rm -rf /var/lib/docker
        sudo systemctl start docker.service
        docker info --format 'docker data-root: {{.DockerRootDir}}'
        df -h / /mnt
