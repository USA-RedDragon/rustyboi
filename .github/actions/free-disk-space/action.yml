name: Free disk space
description: >
  Reclaim the ~20 GB of preinstalled toolchains a GitHub ubuntu runner ships
  (dotnet, GHC, Swift, the runner's Android SDK, the tool cache). Everything here
  builds inside the rust-cross container, so none of it is used — and the runner's
  ~14 GB free on / otherwise runs out mid-build (image + cargo cache + target tree),
  giving intermittent "No space left on device".
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        echo "disk before:"; df -h / | tail -1
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc /usr/local/.ghcup \
          /usr/share/swift \
          /opt/hostedtoolcache \
          /usr/local/share/powershell \
          /usr/local/share/chromium \
          /usr/local/lib/node_modules 2>/dev/null || true
        sudo docker image prune -af >/dev/null 2>&1 || true
        echo "disk after:"; df -h / | tail -1
